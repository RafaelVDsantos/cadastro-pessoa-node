<html>
<head>
    <title>Cadastro de Pessoas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-4">Cadastro de Pessoas</h1>

    <button class="btn btn-primary mb-3" onclick="novo()">Nova Pessoa</button>

    <div id="conteudo"></div>

    <div id="formulario" style="display:none;" class="card p-3">

        <input type="hidden" id="txtid">

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="txtnome" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" id="txttelefone" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="txtemail" class="form-control">
        </div>

        <button class="btn btn-success" onclick="salvar()">Salvar</button>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
